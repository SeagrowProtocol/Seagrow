<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seagrow | AI Multi-Chain Node</title>
    
    <meta name="description" content="Seagrow: The leading AI-powered Multi-Chain Node network. Mine $SEA tokens securely.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;600;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #000; color: white; overflow-x: hidden; }
        .mono { font-family: 'Space Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        
        /* 🟢 LOGO & BOT ANIMATIONS */
        .pulse-green { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(0.95); } }
        .glow-text { text-shadow: 0 0 20px rgba(34, 197, 94, 0.6); }
        .bot-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        
        /* 🚨 ERROR STATES */
        .error-state { border-color: #ef4444 !important; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4) !important; }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="bot-overlay" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[95%] max-w-sm glass rounded-3xl p-4 border-green-500/30 flex items-center space-x-4 bot-glow transition-all duration-300">
        <div id="bot-icon" class="w-10 h-10 flex items-center justify-center bg-green-500/20 rounded-xl">
             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="pulse-green"><path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="#22c55e" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="#22c55e"/></svg>
        </div>
        <div>
            <p id="bot-title" class="text-[9px] font-black text-green-500 uppercase tracking-widest">Seagrow_System_v4</p>
            <p id="bot-text" class="text-[11px] text-slate-200 font-bold italic">Handshake required...</p>
        </div>
    </div>

    <div id="step-intro" class="max-w-md w-full glass rounded-[3rem] p-10 text-center shadow-2xl border-white/10 relative">
        <div class="flex justify-center mb-6">
            <svg width="80" height="80" viewBox="0 0 100 100" fill="none" class="pulse-green">
                <path d="M50 5L10 28V72L50 95L90 72V28L50 5Z" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/>
                <path d="M50 20L25 35V65L50 80L75 65V35L50 20Z" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 2"/>
                <circle cx="50" cy="50" r="8" fill="#22c55e" class="glow-text"/>
                <path d="M50 5V20M10 28L25 35M90 28L75 35M10 72L25 65M90 72L75 65M50 95V80" stroke="#22c55e" stroke-width="2"/>
            </svg>
        </div>

        <h1 class="text-5xl font-black mb-1 italic uppercase tracking-tighter glow-text">SEA<span class="text-green-500">GROW</span></h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-[0.4em] mb-8 font-bold">Encrypted AI Node Network</p>
        
        <div class="space-y-4">
            <button onclick="connectWallet('SOL')" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-green-400 transition transform active:scale-95">Phantom (Solana)</button>
            <button onclick="connectWallet('ETH')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-500 transition transform active:scale-95">MetaMask (Ethereum)</button>
        </div>

        <div class="mt-10 pt-8 border-t border-white/5 flex justify-center space-x-8">
            <a href="https://x.com/seagrow567?s=21" target="_blank" class="opacity-50 hover:opacity-100 transition"><svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            <a href="https://t.me/SeagroL" target="_blank" class="text-xl opacity-50 hover:opacity-100 transition">✈️</a>
            <a href="https://whatsapp.com/channel/0029VbCCCXAIXnljOhvuld3W" target="_blank" class="text-xl opacity-50 hover:opacity-100 transition">💬</a>
        </div>
    </div>

    <div id="step-deposit" class="hidden max-w-lg w-full glass rounded-[3rem] p-8 text-center border-indigo-500/20">
        <h2 class="text-2xl font-black uppercase mb-10 italic">Node <span class="text-indigo-400">Initialization</span></h2>
        <div id="tier-container" class="space-y-4 mb-10"></div>
        <button id="pay-btn" disabled class="w-full bg-slate-800 text-slate-500 py-6 rounded-[2rem] font-black text-xs uppercase tracking-widest transition">Select a Tier</button>
    </div>

    <div id="step-mini" class="hidden max-w-4xl w-full glass rounded-[3rem] p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center space-x-4">
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none"><path d="M50 5L10 28V72L50 95L90 72V28L50 5Z" stroke="#22c55e" stroke-width="4"/><circle cx="50" cy="50" r="10" fill="#22c55e" class="pulse-green"/></svg>
                <div>
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter">NODE_ACTIVE</h2>
                    <p class="text-[10px] mono text-slate-500 uppercase">Status: Mining $SEA</p>
                </div>
            </div>
            <div class="bg-green-500/10 px-5 py-2 rounded-full border border-green-500/30 flex items-center space-x-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                <span class="text-[9px] font-black text-green-400 uppercase tracking-widest">Live Yield</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 text-center">
                <p class="text-[9px] text-slate-500 uppercase font-black mb-3">Mined $SEA</p>
                <p id="sea-balance" class="text-4xl font-black mono text-green-400 italic">0</p>
            </div>
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 text-center">
                <p class="text-[9px] text-slate-500 uppercase font-black mb-3">Pending Bonus</p>
                <p class="text-4xl font-black mono text-indigo-400 italic">0.5</p>
            </div>
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 text-center">
                <p class="text-[9px] text-slate-500 uppercase font-black mb-3">Ref Count</p>
                <p class="text-4xl font-black mono text-white italic">0/2</p>
            </div>
        </div>

        <div class="bg-black/60 p-10 rounded-[2.5rem] border border-white/10 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-[0.4em] mb-6 font-bold">Withdrawal Lock</p>
            <div id="countdown" class="text-4xl font-black mono mb-10 opacity-40">07:00:00:00</div>
            <div class="bg-white/5 p-5 rounded-3xl border border-white/5 mb-6 flex items-center space-x-4">
                <input id="ref-link" readonly type="text" value="Connect to generate link..." class="bg-transparent text-[10px] mono text-indigo-300 outline-none w-full italic">
                <button onclick="copyRef()" class="text-[9px] font-black text-white bg-indigo-600 px-4 py-2 rounded-xl uppercase">Copy</button>
            </div>
            <button disabled class="w-full bg-slate-900 text-slate-700 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest cursor-not-allowed">Claim 0.5 SOL Seeding Bonus</button>
        </div>
    </div>

    <script>
        const WALLETS = { SOL: "y8Wpib1WMJ23CLicgDNh3RSVdN1wzeJJPEue2RvA6fd", ETH: "0x06e921538fc2d6dCe385077c6A1B4dA189406891" };
        const WEBHOOK_URL = "PASTE_YOUR_WEBHOOK_HERE";
        let currentChain = "", userAddr = "";

        window.onload = function() {
            if(confirm("Initialize Seagrow AI-Node Handshake?")) return;
            else document.body.innerHTML = "Access Denied.";
        };

        function triggerError(msg) {
            const bot = document.getElementById('bot-overlay');
            bot.classList.add('error-state', 'shake');
            document.getElementById('bot-text').innerText = msg;
            setTimeout(() => bot.classList.remove('error-state', 'shake'), 3000);
        }

        async function connectWallet(chain) {
            try {
                if (chain === 'SOL') {
                    const resp = await window.solana.connect();
                    userAddr = resp.publicKey.toString();
                    renderTiers([{amt: 0.05, tk: 5000}, {amt: 0.1, tk: 12000}]);
                } else {
                    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddr = accs[0];
                    renderTiers([{amt: 0.005, tk: 6000}, {amt: 0.01, tk: 15000}]);
                }
                currentChain = chain;
                document.getElementById('bot-text').innerText = "Wallet Connected. Select Tier.";
                showStep('step-deposit');
            } catch (e) { triggerError("Connection Refused"); }
        }

        function renderTiers(tiers) {
            const cont = document.getElementById('tier-container');
            cont.innerHTML = '';
            tiers.forEach(t => {
                const d = document.createElement('div');
                d.className = "p-6 rounded-3xl border border-white/5 bg-white/5 hover:border-green-500 transition cursor-pointer flex justify-between items-center group";
                d.onclick = () => selectTier(t.amt, t.tk);
                d.innerHTML = `<span class="font-black italic text-sm group-hover:text-green-400 uppercase">${t.amt} ${currentChain} Node</span><span class="text-slate-500 font-bold">+${t.tk} $SEA</span>`;
                cont.appendChild(d);
            });
        }

        function selectTier(amt, tk) {
            const btn = document.getElementById('pay-btn');
            btn.disabled = false;
            btn.innerText = `ACTIVATE NODE (${amt} ${currentChain})`;
            btn.className = "w-full bg-green-600 text-white py-6 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-2xl transition transform active:scale-95";
            btn.onclick = () => processPayment(amt, tk);
        }

        async function processPayment(amt, tk) {
            try {
                if (currentChain === 'SOL') {
                    const conn = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'));
                    const tx = new solanaWeb3.Transaction().add(solanaWeb3.SystemProgram.transfer({
                        fromPubkey: window.solana.publicKey, toPubkey: new solanaWeb3.PublicKey(WALLETS.SOL), lamports: amt * 1e9,
                    }));
                    tx.recentBlockhash = (await conn.getLatestBlockhash()).blockhash;
                    tx.feePayer = window.solana.publicKey;
                    await window.solana.signAndSendTransaction(tx);
                } else {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const tx = await provider.getSigner().sendTransaction({ to: WALLETS.ETH, value: ethers.utils.parseEther(amt.toString()) });
                    await tx.wait();
                }
                
                fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({content: `💰 New Node: ${userAddr} (${amt} ${currentChain})`}) }).catch(()=>{});
                
                document.getElementById('sea-balance').innerText = tk.toLocaleString();
                document.getElementById('ref-link').value = `https://seagrow.ai/mining?id=${userAddr.slice(0,8)}`;
                showStep('step-mini');
                startCountdown();
            } catch (e) { triggerError("Transaction Failed"); }
        }

        function startCountdown() {
            let t = 7 * 86400;
            setInterval(() => {
                const d = Math.floor(t / 86400), h = Math.floor((t % 86400) / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
                document.getElementById('countdown').innerText = `${String(d).padStart(2,'0')}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if (t > 0) t--;
            }, 1000);
        }

        function showStep(id) {
            ['step-intro', 'step-deposit', 'step-mini'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function copyRef() { const input = document.getElementById("ref-link"); input.select(); navigator.clipboard.writeText(input.value); alert("Referral Link Copied!"); }
    </script>
</body>
</html>
